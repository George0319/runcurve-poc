<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>省エネランカーブ PoC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222636;
  --border:rgba(255,255,255,0.09);--text:#e8eaf0;--muted:#7a7f96;
  --accent:#4f8ef7;--green:#34d399;--orange:#fb923c;--red:#f87171;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);
  color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}

/* ヘッダー */
header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10;}
header h1{font-size:15px;font-weight:600;flex:1;}
.hbtn{background:none;border:1px solid var(--border);border-radius:8px;
  padding:5px 10px;color:var(--muted);cursor:pointer;font-size:12px;white-space:nowrap;}
.hbtn.accent{background:var(--accent);border-color:var(--accent);color:#fff;}

/* タブ */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}

/* ══ 登録タブ ══ */
#regMap{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* タップポップアップ */
.tap-popup{position:absolute;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px;z-index:20;width:240px;
  box-shadow:0 6px 24px rgba(0,0,0,.6);transform:translateX(-50%);}
.tap-popup h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);}
.tap-popup input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;
  outline:none;margin-bottom:8px;}
.tap-popup input:focus{border-color:var(--accent);}
.popup-btns{display:flex;gap:6px;}
.popup-btns button{flex:1;padding:8px;border:none;border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;}
.btn-add{background:var(--accent);color:#fff;}
.btn-cancel{background:var(--surface2);color:var(--muted);}

/* 路線パネル（下） */
.reg-panel{background:var(--surface);border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;flex-shrink:0;display:flex;flex-direction:column;max-height:44vh;}
.panel-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.panel-top{padding:10px 14px 6px;display:flex;align-items:center;gap:8px;}
.panel-top h2{font-size:13px;font-weight:500;color:var(--muted);flex:1;letter-spacing:.04em;text-transform:uppercase;}
.line-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:5px 8px;color:var(--text);font-size:12px;flex:1;max-width:130px;outline:none;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:8px;
  padding:5px 8px;color:var(--muted);cursor:pointer;font-size:14px;}
.icon-btn.red{border-color:rgba(248,113,113,.3);color:var(--red);}

/* 駅リスト（登録済み） */
.reg-list{overflow-y:auto;flex:1;padding:6px 0 12px;}
.reg-list::-webkit-scrollbar{width:3px;}
.reg-list::-webkit-scrollbar-thumb{background:var(--border);}
.reg-item{display:flex;align-items:center;gap:10px;padding:8px 14px;
  border-bottom:1px solid var(--border);cursor:grab;}
.reg-item:last-child{border-bottom:none;}
.reg-num{width:22px;height:22px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.reg-name{flex:1;font-size:13px;}
.reg-dist{font-size:11px;color:var(--muted);}
.reg-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;}
.reg-del:hover{color:var(--red);}
.empty-reg{padding:16px;text-align:center;color:var(--muted);font-size:13px;}

/* 路線名入力バー */
.line-name-bar{padding:8px 14px;display:flex;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.line-name-bar input{flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;}
.line-name-bar input:focus{border-color:var(--accent);}
.color-pick{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
  cursor:pointer;padding:2px;background:none;}

/* ══ 路線一覧タブ ══ */
.line-list-wrap{flex:1;overflow-y:auto;padding:10px 0;}
.line-card{margin:8px 12px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;}
.line-card-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.lc-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0;}
.lc-info{flex:1;}
.lc-name{font-size:14px;font-weight:600;}
.lc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.lc-btns{display:flex;gap:6px;}
.lc-btn{padding:6px 10px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.lc-run{background:var(--accent);color:#fff;}
.lc-edit{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.lc-del{background:none;color:var(--red);border:1px solid rgba(248,113,113,.3);}
.no-lines{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:2;}

/* ══ 走行タブ ══ */
.rc-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;}
.card-title{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;}
.st-pair{display:flex;align-items:center;}
.stb{flex:1;text-align:center;}
.stb-l{font-size:11px;color:var(--muted);margin-bottom:2px;}
.stb-n{font-size:16px;font-weight:700;}
.arrow{padding:0 8px;font-size:18px;color:var(--accent);}
.prog-wrap{margin-top:10px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s;}
.prog-lbl{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--muted);}
.spd-row{display:flex;align-items:flex-end;gap:6px;}
.spd-val{font-size:44px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.spd-unit{font-size:13px;color:var(--muted);margin-bottom:5px;}
.spd-right{margin-left:auto;text-align:right;margin-bottom:5px;}
.grade-now{font-size:11px;color:var(--muted);}
.grade-now b{font-size:13px;}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;}
.badge{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;}
.b-pow{background:rgba(251,146,60,.15);color:var(--orange);border:1px solid rgba(251,146,60,.25);}
.b-cst{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2);}
.b-brk{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.b-gps{background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.b-sim{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.2);}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.bdot.pulse{animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.chart-wrap{position:relative;height:150px;}
.grade-bar{height:5px;border-radius:3px;display:flex;overflow:hidden;margin-top:5px;}
.grade-seg{height:100%;}
.chart-legend{display:flex;gap:12px;margin-top:7px;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.leg-line{width:13px;height:2px;border-radius:1px;}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sc-item{background:var(--surface2);border-radius:8px;padding:9px 11px;}
.sc-label{font-size:11px;color:var(--muted);margin-bottom:3px;}
.sc-val{font-size:17px;font-weight:700;}
.sc-val.good{color:var(--green);}.sc-val.warn{color:var(--orange);}.sc-val.bad{color:var(--red);}
.tot-row{display:flex;align-items:center;gap:11px;margin-bottom:9px;}
.tot-num{font-size:46px;font-weight:700;line-height:1;color:var(--green);font-variant-numeric:tabular-nums;}
.tot-ring{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.tot-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 1s;}

/* GPS待機 */
#gpsWait{display:none;position:fixed;inset:0;background:rgba(15,17,23,.93);
  z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;}
#gpsWait.show{display:flex;}
#gpsWait p{color:var(--muted);font-size:13px;text-align:center;line-height:1.8;}
.big-spin{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#gpsWait button{padding:9px 22px;background:none;color:var(--muted);
  border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;margin-top:4px;}

/* 全体ローディング */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:999;transition:opacity .4s;}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;}
#loading p{color:var(--muted);font-size:13px;}

/* トースト */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  padding:7px 15px;font-size:12px;color:var(--text);z-index:200;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:20px;width:100%;max-width:320px;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px;}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;
  outline:none;margin-bottom:10px;}
.modal input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btns button{flex:1;padding:11px;border:none;border-radius:10px;
  font-size:13px;font-weight:600;cursor:pointer;}
.modal-ok{background:var(--accent);color:#fff;}
.modal-cancel{background:var(--surface2);color:var(--muted);}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><p>現在地を取得中...</p></div>
<div id="toast"></div>

<!-- GPS待機 -->
<div id="gpsWait">
  <div class="big-spin"></div>
  <p id="gpsMsg">GPS位置情報を取得中...</p>
  <button onclick="switchSim()">シミュレーションに切替</button>
</div>

<!-- 駅名入力モーダル -->
<div class="modal-bg" id="stModal">
  <div class="modal">
    <h3>駅を登録</h3>
    <input id="stNameInput" type="text" placeholder="駅名を入力">
    <div id="stModalSub" style="font-size:11px;color:var(--muted);margin-bottom:10px;"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeStModal()">キャンセル</button>
      <button class="modal-ok" onclick="confirmAddStation()">登録</button>
    </div>
  </div>
</div>

<header>
  <h1 id="hTitle">路線登録</h1>
  <button class="hbtn" id="hBtn" style="display:none" onclick="hBtnClick()">走行開始</button>
</header>

<!-- タブ -->
<div class="tabs">
  <div class="tab active" id="tab0" onclick="switchTab(0)">🗺 登録</div>
  <div class="tab" id="tab1" onclick="switchTab(1)">📋 路線一覧</div>
  <div class="tab" id="tab2" onclick="switchTab(2)">🚆 走行</div>
</div>

<!-- ══ 登録タブ ══ -->
<div class="screen active" id="s0">
  <div id="regMap">
    <div id="map"></div>
    <!-- タップポップアップ -->
    <div class="tap-popup" id="tapPopup" style="display:none;position:absolute;top:40%;left:50%;">
      <h3>📍 この場所を駅として登録</h3>
      <input id="tapName" type="text" placeholder="駅名">
      <div class="popup-btns">
        <button class="btn-cancel" onclick="closePopup()">キャンセル</button>
        <button class="btn-add" onclick="addFromPopup()">登録</button>
      </div>
    </div>
  </div>
  <!-- 下パネル -->
  <div class="reg-panel">
    <div class="panel-drag"></div>
    <div class="line-name-bar">
      <input id="lineNameInput" type="text" placeholder="路線名（例: 山手線）" value="">
      <input type="color" class="color-pick" id="colorPick" value="#4f8ef7">
      <button class="icon-btn" title="この路線を保存" onclick="saveLine()">💾</button>
      <button class="icon-btn red" title="リセット" onclick="resetLine()">🗑</button>
    </div>
    <div class="panel-top">
      <h2>登録駅</h2>
      <span id="regCount" style="font-size:12px;color:var(--accent);"></span>
    </div>
    <div class="reg-list" id="regList">
      <div class="empty-reg">地図をタップして駅を登録してください</div>
    </div>
  </div>
</div>

<!-- ══ 路線一覧タブ ══ -->
<div class="screen" id="s1">
  <div class="line-list-wrap" id="lineListWrap">
    <div class="no-lines">登録済みの路線がありません<br><br>「登録」タブで路線を作成してください</div>
  </div>
</div>

<!-- ══ 走行タブ ══ -->
<div class="screen" id="s2">
  <div class="rc-body">
    <div id="noLineMsg" style="padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:2;">
      路線が選択されていません<br>「路線一覧」から走行する路線を選択してください
    </div>
    <div id="rcContent" style="display:contents;">
    <div class="card">
      <div class="card-title">現在区間
        <span id="gpsAcc" style="font-size:11px;font-weight:400;text-transform:none;color:var(--muted);"></span>
      </div>
      <div class="st-pair">
        <div class="stb"><div class="stb-l">現在駅</div><div class="stb-n" id="curSt">—</div></div>
        <div class="arrow">→</div>
        <div class="stb"><div class="stb-l">次の駅</div><div class="stb-n" id="nxtSt">—</div></div>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="prog-lbl"><span id="progA">0m</span><span id="progB">—</span></div>
    </div>
    <div class="card">
      <div class="card-title">現在速度</div>
      <div class="spd-row">
        <div class="spd-val" id="spdVal">0</div>
        <div class="spd-unit">km/h</div>
        <div class="spd-right">
          <div style="font-size:11px;color:var(--muted);">勾配</div>
          <div class="grade-now"><b id="gradeNow" style="color:var(--green)">—</b></div>
        </div>
      </div>
      <div class="badges">
        <div class="badge b-pow" id="bPow" style="display:none"><div class="bdot"></div>力行</div>
        <div class="badge b-cst" id="bCst" style="display:none"><div class="bdot"></div>惰行</div>
        <div class="badge b-brk" id="bBrk" style="display:none"><div class="bdot"></div>制動</div>
        <div class="badge b-gps" id="bGps" style="display:none"><div class="bdot pulse"></div>GPS走行</div>
        <div class="badge b-sim" id="bSim" style="display:none"><div class="bdot"></div>SIM</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">ランカーブ（リアルタイム）</div>
      <div class="chart-wrap"><canvas id="runChart"></canvas></div>
      <div class="grade-bar" id="gradeBar"></div>
      <div class="chart-legend">
        <div class="leg"><div class="leg-line" style="background:var(--accent)"></div>最適曲線</div>
        <div class="leg"><div class="leg-line" style="background:var(--orange);border-top:2px dashed var(--orange);height:0"></div>実走行</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">省エネスコア</div>
      <div class="tot-row">
        <div class="tot-num" id="totScore">—</div>
        <div style="flex:1">
          <div style="font-size:11px;color:var(--muted);margin-bottom:5px;">/ 100点</div>
          <div class="tot-ring"><div class="tot-fill" id="totFill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="score-grid">
        <div class="sc-item"><div class="sc-label">惰行率</div><div class="sc-val good" id="scCoast">—</div></div>
        <div class="sc-item"><div class="sc-label">速度偏差(RMS)</div><div class="sc-val" id="scRms">—</div></div>
        <div class="sc-item"><div class="sc-label">制限速度超過</div><div class="sc-val" id="scOver">—</div></div>
        <div class="sc-item"><div class="sc-label">推定節約</div><div class="sc-val good" id="scSave">—</div></div>
      </div>
    </div>
    </div><!-- rcContent -->
  </div>
</div>

<script>
/* ══ ストレージ ══ */
const DB_KEY='runcurve_lines_v2';
function loadDB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'[]');}catch{return[];}}
function saveDB(d){localStorage.setItem(DB_KEY,JSON.stringify(d));}

/* ══ 状態 ══ */
let map,markerSource,routeSource,gpsSource;
let pendingLatLon=null;
let editingStations=[];  // 現在編集中の駅リスト
let activeRunLine=null;  // 走行中の路線
let savedLines=loadDB();

/* ══ 地図初期化 ══ */
function initMap(lat,lon){
  markerSource=new ol.source.Vector();
  routeSource=new ol.source.Vector();
  gpsSource=new ol.source.Vector();

  const markerLayer=new ol.layer.Vector({source:markerSource,
    style:f=>new ol.style.Style({
      image:new ol.style.Circle({radius:f.get('big')?8:6,
        fill:new ol.style.Fill({color:f.get('color')||'#4f8ef7'}),
        stroke:new ol.style.Stroke({color:'#fff',width:2})}),
      text:f.get('label')?new ol.style.Text({text:f.get('label'),
        offsetY:-16,font:'bold 11px sans-serif',
        fill:new ol.style.Fill({color:'#fff'}),
        stroke:new ol.style.Stroke({color:'#000',width:3})}):null,
    })
  });
  const routeLayer=new ol.layer.Vector({source:routeSource,
    style:f=>new ol.style.Style({
      stroke:new ol.style.Stroke({color:f.get('color')||'#4f8ef7',width:3,lineDash:f.get('dash')?[6,4]:null})
    })
  });
  const gpsLayer=new ol.layer.Vector({source:gpsSource,
    style:new ol.style.Style({image:new ol.style.Circle({radius:9,
      fill:new ol.style.Fill({color:'rgba(52,211,153,.85)'}),
      stroke:new ol.style.Stroke({color:'#fff',width:2})})})
  });

  map=new ol.Map({
    target:'map',
    layers:[new ol.layer.Tile({source:new ol.source.OSM()}),routeLayer,markerLayer,gpsLayer],
    view:new ol.View({center:ol.proj.fromLonLat([lon,lat]),zoom:14}),
    controls:ol.control.defaults.defaults({zoom:true,attribution:false}),
  });

  map.on('singleclick',e=>{
    const[ln,la]=ol.proj.toLonLat(e.coordinate);
    openStModal(la,ln,e.pixel);
  });

  const ld=document.getElementById('loading');
  ld.style.opacity='0';setTimeout(()=>ld.remove(),400);
}

/* ══ タブ切替 ══ */
function switchTab(n){
  ['s0','s1','s2'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('active',i===n);
    document.getElementById('tab'+i).classList.toggle('active',i===n);
  });
  const titles=['路線登録','路線一覧','走行'];
  document.getElementById('hTitle').textContent=titles[n];
  const hBtn=document.getElementById('hBtn');
  if(n===0&&editingStations.length>=2){hBtn.style.display='';hBtn.textContent='保存して走行';}
  else if(n===2&&activeRunLine){hBtn.style.display='';hBtn.textContent='停止';}
  else hBtn.style.display='none';
  if(n===1)renderLineList();
  if(n===2)renderRunTab();
}
function hBtnClick(){
  const n=document.querySelectorAll('.tab.active')[0]?.id.replace('tab','');
  if(n==='0')saveLine(true);
  else if(n==='2')stopAll();
}

/* ══ 駅登録（地図タップ → モーダル） ══ */
function openStModal(la,ln,pixel){
  pendingLatLon={la,ln};
  document.getElementById('stNameInput').value='';
  document.getElementById('stModalSub').textContent=`緯度: ${la.toFixed(5)}, 経度: ${ln.toFixed(5)}`;
  document.getElementById('stModal').classList.add('show');
  setTimeout(()=>document.getElementById('stNameInput').focus(),100);
}
function closeStModal(){
  document.getElementById('stModal').classList.remove('show');
  pendingLatLon=null;
}
document.getElementById('stNameInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')confirmAddStation();
});
function confirmAddStation(){
  const name=document.getElementById('stNameInput').value.trim();
  if(!name){toast('駅名を入力してください');return;}
  if(!pendingLatLon)return;
  addStation(name,pendingLatLon.la,pendingLatLon.ln);
  closeStModal();
}

function addStation(name,la,ln){
  editingStations.push({name,lat:la,lon:ln});
  toast(`「${name}」を登録しました`);
  rebuildEditMap();
  renderRegList();
}

function rebuildEditMap(){
  markerSource.clear();routeSource.clear();
  const color=document.getElementById('colorPick').value;
  if(editingStations.length===0)return;
  // 駅マーカー
  editingStations.forEach((s,i)=>{
    markerSource.addFeature(new ol.Feature({
      geometry:new ol.geom.Point(ol.proj.fromLonLat([s.lon,s.lat])),
      color,label:s.name,big:true,
    }));
  });
  // 路線（破線）
  if(editingStations.length>=2){
    const coords=editingStations.map(s=>ol.proj.fromLonLat([s.lon,s.lat]));
    routeSource.addFeature(new ol.Feature({geometry:new ol.geom.LineString(coords),color,dash:true}));
    map.getView().fit(routeSource.getExtent(),{padding:[60,40,260,40],duration:400,maxZoom:15});
  }
}

function renderRegList(){
  const el=document.getElementById('regList');
  document.getElementById('regCount').textContent=editingStations.length+'駅';
  if(!editingStations.length){
    el.innerHTML='<div class="empty-reg">地図をタップして駅を登録してください</div>';
    document.getElementById('hBtn').style.display='none';
    return;
  }
  el.innerHTML='';
  editingStations.forEach((s,i)=>{
    const dist=i===0?0:haversine(editingStations[0].lat,editingStations[0].lon,s.lat,s.lon);
    const div=document.createElement('div');
    div.className='reg-item';
    div.innerHTML=`
      <div class="reg-num">${i+1}</div>
      <div class="reg-name">${s.name}</div>
      <div class="reg-dist">${dist.toFixed(1)}km</div>
      <button class="reg-del" onclick="removeStation(${i})">✕</button>`;
    el.appendChild(div);
  });
  if(editingStations.length>=2)document.getElementById('hBtn').style.display='';
}

function removeStation(i){
  editingStations.splice(i,1);
  rebuildEditMap();renderRegList();
}

function resetLine(){
  if(editingStations.length&&!confirm('登録内容をリセットしますか？'))return;
  editingStations=[];
  markerSource?.clear();routeSource?.clear();
  document.getElementById('lineNameInput').value='';
  renderRegList();
}

/* ══ 路線保存 ══ */
function saveLine(andRun=false){
  if(editingStations.length<2){toast('2駅以上登録してください');return;}
  const name=document.getElementById('lineNameInput').value.trim()||'路線'+Date.now();
  const color=document.getElementById('colorPick').value;
  const o=editingStations[0];
  const stations=editingStations.map(s=>({...s,dist:haversine(o.lat,o.lon,s.lat,s.lon)}));
  const line={id:Date.now(),name,color,stations,grades:null,elevs:null,savedAt:new Date().toISOString()};
  savedLines.push(line);saveDB(savedLines);
  toast(`「${name}」を保存しました`);
  if(andRun){activeRunLine=line;switchTab(2);}
  else switchTab(1);
}

/* ══ 路線一覧 ══ */
function renderLineList(){
  const el=document.getElementById('lineListWrap');
  savedLines=loadDB();
  if(!savedLines.length){
    el.innerHTML='<div class="no-lines">登録済みの路線がありません<br><br>「登録」タブで路線を作成してください</div>';
    return;
  }
  el.innerHTML='';
  savedLines.forEach(line=>{
    const d=line.stations.at(-1)?.dist?.toFixed(1)||'?';
    const card=document.createElement('div');
    card.className='line-card';
    card.innerHTML=`
      <div class="line-card-head">
        <div class="lc-bar" style="background:${line.color}"></div>
        <div class="lc-info">
          <div class="lc-name">${line.name}</div>
          <div class="lc-sub">${line.stations.length}駅 · ${d}km</div>
        </div>
        <div class="lc-btns">
          <button class="lc-btn lc-edit" onclick="editLine(${line.id})">編集</button>
          <button class="lc-btn lc-run" onclick="runLine(${line.id})">走行</button>
        </div>
      </div>`;
    el.appendChild(card);
  });
}

function editLine(id){
  const line=savedLines.find(l=>l.id===id);if(!line)return;
  document.getElementById('lineNameInput').value=line.name;
  document.getElementById('colorPick').value=line.color;
  editingStations=[...line.stations.map(s=>({name:s.name,lat:s.lat,lon:s.lon}))];
  rebuildEditMap();renderRegList();
  switchTab(0);toast('編集モードで開きました');
}
function deleteLine(id){
  if(!confirm('この路線を削除しますか？'))return;
  savedLines=savedLines.filter(l=>l.id!==id);
  saveDB(savedLines);renderLineList();
}
function runLine(id){
  const line=savedLines.find(l=>l.id===id);if(!line)return;
  activeRunLine=line;switchTab(2);
}

/* ══ 走行タブ表示 ══ */
function renderRunTab(){
  const nm=document.getElementById('noLineMsg');
  const rc=document.getElementById('rcContent');
  if(!activeRunLine){nm.style.display='';rc.style.display='none';
    document.getElementById('hBtn').style.display='none';return;}
  nm.style.display='none';rc.style.display='contents';
  document.getElementById('hBtn').style.display='';document.getElementById('hBtn').textContent='停止';
  // 勾配バー（登録済みなら）
  showModeDialog();
}

/* ══ モード選択 ══ */
function showModeDialog(){
  stopAll();
  const ok=confirm(`「${activeRunLine.name}」で走行します\nOK → GPS実走行\nキャンセル → シミュレーション`);
  ok?startGPS():startSim();
}

/* ══ GPS走行 ══ */
let gpsId=null,gpsMode=false,curIdx=0,departed=false,dwellStart=null;
const DWELL_MS=10000,MOVE_KMH=2,ST_RAD=200;

function startGPS(){
  if(!navigator.geolocation){toast('Geolocation非対応');startSim();return;}
  gpsMode=true;curIdx=0;departed=false;dwellStart=null;
  initChart();setBadges('gps');
  document.getElementById('gpsWait').classList.add('show');
  gpsId=navigator.geolocation.watchPosition(onGps,
    e=>{toast('GPS失敗: '+e.message);switchSim();},
    {enableHighAccuracy:true,maximumAge:1000,timeout:15000});
}
function stopGPS(){
  if(gpsId!=null){navigator.geolocation.clearWatch(gpsId);gpsId=null;}
  document.getElementById('gpsWait').classList.remove('show');
}
function switchSim(){stopGPS();startSim();}

function onGps(pos){
  const{latitude:la,longitude:ln,speed,accuracy}=pos.coords;
  const kmh=speed!=null?Math.max(0,speed*3.6):null;
  document.getElementById('gpsAcc').textContent=`GPS ±${Math.round(accuracy)}m`;
  gpsSource.clear();
  gpsSource.addFeature(new ol.Feature({geometry:new ol.geom.Point(ol.proj.fromLonLat([ln,la]))}));
  const sts=activeRunLine.stations;
  if(!departed){
    let minD=1e9,minI=0;
    sts.forEach((s,i)=>{const d=haversine(la,ln,s.lat,s.lon)*1000;if(d<minD){minD=d;minI=i;}});
    const dw=minD<ST_RAD;
    if(dw){
      if(!dwellStart){dwellStart=pos.timestamp;curIdx=minI;}
      const left=Math.max(0,(DWELL_MS-(pos.timestamp-dwellStart))/1000).toFixed(0);
      document.getElementById('gpsMsg').textContent=
        `${sts[minI].name}付近で停車確認中\n出発まで約${left}秒\n次: ${sts[Math.min(minI+1,sts.length-1)].name}`;
      if((pos.timestamp-dwellStart)>=DWELL_MS&&(kmh==null||kmh>=MOVE_KMH)){
        departed=true;curIdx=minI;
        document.getElementById('gpsWait').classList.remove('show');
        toast(`${sts[minI].name}を出発！`);
      }
    }else{
      dwellStart=null;
      document.getElementById('gpsMsg').textContent=
        `GPS走行待機中\n最寄駅: ${sts[minI].name}\n(${Math.round(minD)}m先)`;
    }
    updateSpd(kmh||0);return;
  }
  const ni=curIdx+1;
  if(ni<sts.length){
    const dn=haversine(la,ln,sts[ni].lat,sts[ni].lon)*1000;
    if(dn<ST_RAD&&(kmh==null||kmh<MOVE_KMH)){
      curIdx=ni;departed=false;dwellStart=pos.timestamp;
      resetSeg();toast(`${sts[ni].name}に到着`);
      if(ni>=sts.length-1){toast('終点到着！');stopGPS();}
      return;
    }
  }
  const ss=sts[curIdx],ns=sts[Math.min(curIdx+1,sts.length-1)];
  const segM=Math.max(200,haversine(ss.lat,ss.lon,ns.lat,ns.lon)*1000);
  const gone=Math.min(segM,haversine(ss.lat,ss.lon,la,ln)*1000);
  updateSegUI(ss,ns,gone/segM,segM,kmh||0);
  actSpd.push(+(kmh||0).toFixed(1));pushChart();updateScore();
}

/* ══ シミュレーション ══ */
let simTimer=null,simIdx=0,simT=0;
function startSim(){
  gpsMode=false;initChart();setBadges('sim');simIdx=0;simT=0;
  simTick();simTimer=setInterval(simTick,500);
}
function stopSim(){if(simTimer){clearInterval(simTimer);simTimer=null;}}
function stopAll(){stopSim();stopGPS();if(rc){rc.destroy();rc=null;}}

function simTick(){
  if(!activeRunLine)return;
  const sts=activeRunLine.stations;
  if(simIdx>=sts.length-1){stopSim();toast('走行完了！');return;}
  simT+=0.028;
  if(simT>1){simT=0;simIdx++;
    if(simIdx>=sts.length-1){stopSim();toast('走行完了！');return;}
    resetSeg();}
  const ti=Math.min(POINTS-1,Math.floor(simT*(POINTS-1)));
  const opt=optSpd[ti]??0;
  const act=Math.max(0,Math.min(115,opt+(Math.random()-.5)*16+(simT>.6?4:0)));
  actSpd.push(+act.toFixed(1));pushChart();
  const d0=sts[simIdx].dist||0,d1=sts[simIdx+1]?.dist||0;
  updateSegUI(sts[simIdx],sts[simIdx+1]||sts[simIdx],simT,Math.max(300,(d1-d0)*1000),act);
  updateScore();
}

/* ══ ランカーブ ══ */
let rc=null,optSpd=[],actSpd=[];
const POINTS=60;

function gradeAt(i){return activeRunLine?.grades?.[i]?.grade||0;}
function buildOpt(g=0){
  const g2=Math.max(-30,Math.min(30,g));
  const maxV=Math.min(110,100-g2*.5);
  const ae=.20+g2*.003,cs=.55-g2*.004,bs=.82+g2*.002;
  return Array.from({length:POINTS},(_,i)=>{
    const t=i/(POINTS-1);
    if(t<ae)return+(t/ae*maxV);
    if(t<cs)return maxV;
    if(t<bs)return+(maxV-(t-cs)/(bs-cs)*15);
    return+(Math.max(0,maxV-15-(t-bs)/(1-bs)*(maxV-15)));
  });
}
function initChart(){
  if(rc)rc.destroy();
  const gi=gpsMode?curIdx:simIdx;
  optSpd=buildOpt(gradeAt(gi));actSpd=[];buildGradeBar(gradeAt(gi));
  const ctx=document.getElementById('runChart').getContext('2d');
  rc=new Chart(ctx,{type:'line',
    data:{labels:optSpd.map((_,i)=>i),datasets:[
      {label:'最適',data:optSpd,borderColor:'#4f8ef7',borderWidth:2,pointRadius:0,tension:.4,
        fill:{target:'origin',above:'rgba(79,142,247,.06)'}},
      {label:'実走行',data:[],borderColor:'#fb923c',borderWidth:2,borderDash:[5,3],pointRadius:0,tension:.3,fill:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{min:0,max:120,border:{display:false},
        grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#7a7f96',font:{size:10},callback:v=>v+''}}}
    }});
}
function resetSeg(){
  const gi=gpsMode?curIdx:simIdx;
  optSpd=buildOpt(gradeAt(gi));actSpd=[];buildGradeBar(gradeAt(gi));
  if(rc){rc.data.datasets[0].data=optSpd;rc.data.datasets[1].data=[];rc.update('none');}
}
function pushChart(){
  if(!rc)return;
  rc.data.datasets[1].data=[...actSpd,...Array(Math.max(0,POINTS-actSpd.length)).fill(null)];
  rc.update('none');
}
function buildGradeBar(g){
  const bar=document.getElementById('gradeBar');bar.innerHTML='';
  const col=Math.abs(g)<3?'#34d399':g>0?'#fb923c':'#4f8ef7';
  const op=Math.min(1,.3+Math.abs(g)/50);
  for(let i=0;i<POINTS;i++){
    const s=document.createElement('div');s.className='grade-seg';
    s.style.cssText=`flex:1;background:${col};opacity:${op.toFixed(2)}`;
    bar.appendChild(s);
  }
}

function updateSegUI(ss,ns,t,segM,kmh){
  document.getElementById('curSt').textContent=ss?.name||'—';
  document.getElementById('nxtSt').textContent=ns?.name||'—';
  document.getElementById('prog').style.width=(Math.min(1,t)*100).toFixed(1)+'%';
  document.getElementById('progA').textContent=Math.round(t*segM)+'m';
  document.getElementById('progB').textContent=Math.round(segM)+'m';
  updateSpd(kmh);
}
function updateSpd(kmh){
  document.getElementById('spdVal').textContent=Math.round(kmh);
  const ph=kmh<5?'Brk':kmh<92?'Cst':'Pow';
  ['bPow','bCst','bBrk'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('b'+ph).style.display='flex';
}
function setBadges(mode){
  document.getElementById('bGps').style.display=mode==='gps'?'flex':'none';
  document.getElementById('bSim').style.display=mode==='sim'?'flex':'none';
}
function updateScore(){
  const a=actSpd.filter(v=>v!=null);if(a.length<2)return;
  const coast=a.filter((v,i)=>i>0&&Math.abs(v-a[i-1])<3).length;
  const rms=Math.sqrt(a.reduce((s,v,i)=>{
    const d=v-(optSpd[Math.floor(i/a.length*(POINTS-1))]||0);return s+d*d;},0)/a.length);
  const over=a.filter(v=>v>102).length;
  const score=Math.max(40,Math.min(99,95-rms*.4-over*3));
  document.getElementById('totScore').textContent=Math.round(score);
  document.getElementById('totFill').style.width=score.toFixed(0)+'%';
  document.getElementById('scCoast').textContent=Math.round(coast/a.length*100)+'%';
  document.getElementById('scRms').textContent=rms.toFixed(1)+' km/h';
  document.getElementById('scRms').className='sc-val '+(rms<8?'good':rms<15?'warn':'bad');
  document.getElementById('scOver').textContent=over+'回';
  document.getElementById('scOver').className='sc-val '+(over===0?'good':over<3?'warn':'bad');
  document.getElementById('scSave').textContent='+'+Math.max(0,(100-rms)*.12).toFixed(1)+'%';
}

/* ══ ユーティリティ ══ */
function haversine(la1,ln1,la2,ln2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

/* ══ 起動 ══ */
window.addEventListener('load',()=>{
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      p=>initMap(p.coords.latitude,p.coords.longitude),
      ()=>initMap(35.6812,139.7671),
      {enableHighAccuracy:true,timeout:8000,maximumAge:0}
    );
  }else{initMap(35.6812,139.7671);}
});
</script>
